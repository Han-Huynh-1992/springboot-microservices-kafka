# Kafka Broker
services:
  broker:
    image: apache/kafka:latest
    container_name: broker
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      # 0.0.0.0 -> listen from outside container
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@broker:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 1
      
# MySQL Database
  mysql:
      image: mysql:8.0
      container_name: mysql
      environment:
        MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
        MYSQL_CHARACTER_SET_SERVER: utf8mb4
        MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
      ports:
        - "3306:3306"
      volumes:
        - mysql_data:/var/lib/mysql
        # Run init.sql of 3 services when starting container in first time
        - ./orderservice/src/main/resources/init.sql:/docker-entrypoint-initdb.d/01_order.sql
        - ./emailservice/src/main/resources/init.sql:/docker-entrypoint-initdb.d/02_email.sql
        - ./shipmentservice/src/main/resources/init.sql:/docker-entrypoint-initdb.d/03_shipment.sql
      healthcheck:
        test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
        interval: 10s
        timeout: 5s
        retries: 5

# OrderService — Producer
  orderservice:
    depends_on:
      - broker
      - mysql
    entrypoint: [ "sh", "-c", "sleep 30 && java -jar /orderservice-0.0.1-SNAPSHOT.jar" ]
    build:
      context: orderservice
      dockerfile: Dockerfile
    image: order-service
    ports:
      - 8080:8080
    env_file:
      - local.env
    restart: on-failure

# EmailService — Consumer
  emailservice:
    depends_on:
      - broker
      - mysql
    entrypoint: [ "sh", "-c", "sleep 30 && java -jar /emailservice-0.0.1-SNAPSHOT.jar" ]
    build:
      context: emailservice
      dockerfile: Dockerfile
    image: email-service
    ports:
      - 8081:8081
    dns:
      - 8.8.8.8
      - 8.8.4.4
    env_file:
      - local.env
    restart: on-failure

# ShipmentService — Consumer
  shipmentservice:
    depends_on:
      - broker
      - mysql
    entrypoint: [ "sh", "-c", "sleep 30 && java -jar /shipmentservice-0.0.1-SNAPSHOT.jar" ]
    build:
      context: shipmentservice
      dockerfile: Dockerfile
    image: shipment-service
    ports:
      - 8082:8082
    env_file:
      - local.env
    restart: on-failure
 
volumes:
  mysql_data:
    driver: local